name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test_nutrition.db"
          SECRET_KEY: "ci-secret-key-000000000000000000000000000000000000000000000000"
          DEBUG: "false"
        run: pytest -q

  frontend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install jsdom
        working-directory: tests/frontend
        run: npm install --no-audit --no-fund

      - name: Frontend load smoke
        working-directory: tests/frontend
        run: node smoke.mjs
