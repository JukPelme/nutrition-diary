<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дневник питания</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
</head>
<body>

<!-- Auth Page -->
<div id="auth-page" class="page">
    <div class="auth-container">
        <div class="auth-logo">🥗</div>
        <h1 class="auth-title">Дневник питания</h1>
        <p class="auth-subtitle">Следите за рационом и КБЖУ</p>

        <form id="auth-form" onsubmit="handleLogin(event)">
            <div id="auth-name-group" class="form-group hidden">
                <input type="text" id="auth-name" class="input" placeholder="Имя">
            </div>
            <div class="form-group">
                <input type="email" id="auth-email" class="input" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" id="auth-password" class="input" placeholder="Пароль" required>
            </div>
            <button type="submit" id="auth-submit" class="btn btn-primary">Войти</button>
        </form>

        <p id="auth-toggle-text" class="auth-toggle">
            Нет аккаунта? <a href="#" onclick="toggleAuthMode()">Регистрация</a>
        </p>
    </div>
</div>

<!-- App Page -->
<div id="app-page" class="page hidden">

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <span class="header-logo">🥗</span>
            <span class="header-title">Дневник</span>
        </div>
        <div class="header-right">
            <button class="btn-icon" onclick="logout()" title="Выйти">⏻</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Diary View -->
        <div id="diary-view">
            <!-- Date Navigation -->
            <div class="date-nav">
                <button class="btn-icon" onclick="changeDate(-1)">◀</button>
                <span id="date-display" class="date-text">Сегодня</span>
                <button class="btn-icon" onclick="changeDate(1)">▶</button>
            </div>

            <!-- Calorie Summary -->
            <div class="card summary-card">
                <div class="summary-ring">
                    <svg viewBox="0 0 100 100" class="ring-svg">
                        <circle cx="50" cy="50" r="40" fill="none" stroke="var(--bg3)" stroke-width="8"/>
                        <circle id="cal-ring" cx="50" cy="50" r="40" fill="none" stroke="var(--accent)" stroke-width="8"
                            stroke-linecap="round" transform="rotate(-90 50 50)"
                            stroke-dasharray="251.3" stroke-dashoffset="251.3"/>
                    </svg>
                    <div class="ring-text">
                        <div id="cal-num" class="ring-num">0</div>
                        <div id="cal-left" class="ring-label">из 2000</div>
                    </div>
                </div>
                <div class="macros">
                    <div class="macro macro-protein">
                        <div class="macro-bar"><div class="macro-fill" style="width:0%"></div></div>
                        <div class="macro-info">
                            <span class="macro-label">Белки</span>
                            <span id="protein-val" class="macro-value">0г</span>
                        </div>
                    </div>
                    <div class="macro macro-fat">
                        <div class="macro-bar"><div class="macro-fill" style="width:0%"></div></div>
                        <div class="macro-info">
                            <span class="macro-label">Жиры</span>
                            <span id="fat-val" class="macro-value">0г</span>
                        </div>
                    </div>
                    <div class="macro macro-carbs">
                        <div class="macro-bar"><div class="macro-fill" style="width:0%"></div></div>
                        <div class="macro-info">
                            <span class="macro-label">Углеводы</span>
                            <span id="carbs-val" class="macro-value">0г</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Meals Container -->
            <div id="meals-container"></div>
        </div>

        <!-- Stats View -->
        <div id="stats-view" class="hidden">
            <div id="stats-content">
                <div class="card" style="text-align:center;padding:40px">
                    <div style="color:var(--text2)">Загрузка статистики...</div>
                </div>
            </div>
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-tab active" data-tab="diary" onclick="setActiveTab('diary')">
            <div class="nav-icon">📖</div>
            <div class="nav-label">Дневник</div>
        </div>
        <div class="nav-tab" data-tab="stats" onclick="setActiveTab('stats')">
            <div class="nav-icon">📊</div>
            <div class="nav-label">Статистика</div>
        </div>
    </nav>

    <!-- Add Food Modal -->
    <div id="add-food-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Добавить продукт</h3>
                <button class="btn-icon" onclick="closeModal('add-food-modal')">✕</button>
            </div>
            <div class="form-group">
                <input type="text" id="food-search" class="input" placeholder="Поиск продукта..." oninput="onFoodSearch(event)" autocomplete="off">
            </div>
            <div id="search-results" class="search-results"></div>
        </div>
    </div>

    <!-- Portion Modal -->
    <div id="portion-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="portion-product-name">Продукт</h3>
                <button class="btn-icon" onclick="closeModal('portion-modal')">✕</button>
            </div>
            <div class="form-group">
                <label class="label">Порция, г</label>
                <input type="number" id="portion-amount" class="input" value="100" min="1" oninput="updatePortionCalc()">
            </div>
            <div class="portion-preview">
                <div class="portion-cal-big"><span id="portion-cal">0</span> ккал</div>
                <div class="portion-macros">
                    <span class="pm protein">Б: <span id="portion-protein">0г</span></span>
                    <span class="pm fat">Ж: <span id="portion-fat">0г</span></span>
                    <span class="pm carbs">У: <span id="portion-carbs">0г</span></span>
                </div>
            </div>
            <button class="btn btn-primary" onclick="addToDiary()">Добавить</button>
        </div>
    </div>

</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
